<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  min-height: 100%;
  background: #0d0608;
  font-family: 'Lato', sans-serif;
  color: #f5ede0;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* BG */
.bg-glow {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(140,20,40,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 80%, rgba(180,120,20,0.15) 0%, transparent 60%),
    #0d0608;
}

.page { position: relative; z-index: 1; width: 100%; max-width: 500px; padding: 0 20px 60px; }

/* HEADER */
.header { text-align: center; padding: 36px 0 24px; }
.logo-her { font-family: 'Playfair Display', serif; font-size: 11px; letter-spacing: 0.7em; color: #c9a84c; text-transform: uppercase; display: block; }
.logo-era { font-family: 'Playfair Display', serif; font-size: 38px; font-style: italic; color: #fff; display: block; line-height: 1.1; }
.logo-sub { font-size: 12px; letter-spacing: 0.3em; color: #8a5840; text-transform: uppercase; margin-top: 6px; display: block; }

/* LEVEL TABS */
.levels { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
.level-btn {
  font-size: 12px; font-family: 'Lato', sans-serif; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 8px 16px; border-radius: 24px; cursor: pointer;
  border: 1px solid rgba(201,168,76,0.3);
  background: none; color: #c9a84c;
  transition: all 0.2s;
}
.level-btn.active, .level-btn:hover { background: rgba(201,168,76,0.15); border-color: #c9a84c; }
.level-btn.lv1.active { background: rgba(80,180,80,0.15); border-color: #50b450; color: #70d470; }
.level-btn.lv2.active { background: rgba(201,168,76,0.2); border-color: #c9a84c; color: #e8c060; }
.level-btn.lv3.active { background: rgba(200,60,40,0.2); border-color: #c84030; color: #e86050; }

/* STATS */
.stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 28px; }
.stat { text-align: center; }
.stat-n { font-family: 'Playfair Display', serif; font-size: 28px; color: #c9a84c; }
.stat-l { font-size: 10px; letter-spacing: 0.15em; color: #7a5030; text-transform: uppercase; margin-top: 2px; }

/* CARD AREA */
.card-area { perspective: 1200px; margin-bottom: 28px; cursor: pointer; }

.card-wrap {
  width: 100%; aspect-ratio: 3/4; max-height: 420px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
}
.card-wrap.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  border-radius: 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 28px;
  text-align: center;
}

/* BACK */
.card-back {
  background: linear-gradient(145deg, #1a0810, #2d0f18, #1a0810);
  border: 1px solid rgba(201,168,76,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(201,168,76,0.15);
}
.card-back::before {
  content: '';
  position: absolute; inset: 12px;
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 12px;
}
.card-back-logo { font-family: 'Playfair Display', serif; font-style: italic; font-size: 48px; color: rgba(201,168,76,0.4); margin-bottom: 12px; }
.card-back-text { font-size: 10px; letter-spacing: 0.4em; color: rgba(201,168,76,0.3); text-transform: uppercase; }
.card-tap-hint { font-size: 12px; color: rgba(201,168,76,0.5); letter-spacing: 0.1em; margin-top: 20px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

/* FRONT */
.card-front {
  transform: rotateY(180deg);
  background: linear-gradient(145deg, #1a0810, #2a1020, #1a0810);
  border: 1px solid rgba(201,168,76,0.25);
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(201,168,76,0.1);
}
.card-level-badge {
  position: absolute; top: 20px; right: 20px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 4px 12px; border-radius: 20px;
}
.badge-easy { background: rgba(80,180,80,0.15); color: #70d470; border: 1px solid rgba(80,180,80,0.3); }
.badge-medium { background: rgba(201,168,76,0.15); color: #e8c060; border: 1px solid rgba(201,168,76,0.3); }
.badge-hard { background: rgba(200,60,40,0.15); color: #e86050; border: 1px solid rgba(200,60,40,0.3); }

.card-number { font-size: 11px; letter-spacing: 0.2em; color: rgba(201,168,76,0.4); text-transform: uppercase; margin-bottom: 20px; }
.card-emoji { font-size: 52px; margin-bottom: 20px; line-height: 1; }
.card-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #f5ede0; line-height: 1.5; font-style: italic; }
.card-sub { font-size: 12px; color: #8a6040; margin-top: 14px; line-height: 1.5; }

/* BUTTONS */
.btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn {
  padding: 13px 24px; border-radius: 30px; border: none;
  font-size: 14px; font-family: 'Lato', sans-serif; font-weight: 700;
  cursor: pointer; letter-spacing: 0.05em; transition: all 0.2s;
}
.btn-main {
  background: linear-gradient(135deg, #c9a84c, #a07828);
  color: #1a0810; flex: 1; max-width: 220px;
}
.btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); }
.btn-skip {
  background: rgba(255,255,255,0.06);
  color: rgba(245,237,224,0.5);
  border: 1px solid rgba(255,255,255,0.08);
}
.btn-skip:hover { background: rgba(255,255,255,0.1); color: #f5ede0; }

/* COMPLETED */
.done-screen {
  display: none; text-align: center;
  padding: 40px 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 20px;
  margin-bottom: 28px;
}
.done-screen.show { display: block; }
.done-emoji { font-size: 64px; margin-bottom: 16px; }
.done-title { font-family: 'Playfair Display', serif; font-size: 28px; color: #c9a84c; margin-bottom: 10px; }
.done-sub { font-size: 14px; color: #8a6040; line-height: 1.6; }

/* HISTORY */
.history { margin-top: 32px; }
.history-title { font-size: 11px; letter-spacing: 0.25em; color: #7a5030; text-transform: uppercase; text-align: center; margin-bottom: 14px; }
.hist-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 10px 14px; border-radius: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  margin-bottom: 8px;
  opacity: 0.6;
}
.hist-emoji { font-size: 18px; flex-shrink: 0; }
.hist-text { font-size: 13px; color: #c9a870; font-style: italic; line-height: 1.4; }

.ornament { text-align: center; color: #3a1a10; font-size: 12px; letter-spacing: 0.4em; padding: 12px 0; }

let currentLevel = 'easy';
let deck = [];
let current = null;
let isFlipped = false;
let doneCount = 0;
let skipCount = 0;
let history = [];

function setLevel(level, btn) {
  currentLevel = level;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  restart();
}

function buildDeck() {
  let cards = [];
  if (currentLevel === 'all') {
    cards = [...CARDS.easy, ...CARDS.medium, ...CARDS.hard];
  } else {
    cards = [...CARDS[currentLevel]];
  }
  // Shuffle
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  return cards.map((c, i) => ({...c, idx: i + 1, level: getLevelOfCard(c)}));
}

function getLevelOfCard(c) {
  if (CARDS.easy.includes(c) || (currentLevel === 'easy')) return 'easy';
  if (CARDS.medium.includes(c)) return 'medium';
  if (CARDS.hard.includes(c)) return 'hard';
  return currentLevel;
}

function getLevelForCard(card) {
  // Find which level this card belongs to
  for (const [lv, cards] of Object.entries(CARDS)) {
    if (cards.some(c => c.t === card.t)) return lv;
  }
  return currentLevel;
}

function restart() {
  deck = buildDeck();
  doneCount = 0;
  skipCount = 0;
  history = [];
  isFlipped = false;
  document.getElementById('cardWrap').classList.remove('flipped');
  document.getElementById('doneScreen').classList.remove('show');
  document.getElementById('actionBtns').style.display = 'flex';
  document.getElementById('historyEl').style.display = 'none';
  document.getElementById('historyList').innerHTML = '';
  loadNext();
  updateStats();
}

function loadNext() {
  if (deck.length === 0) {
    showDone();
    return;
  }
  current = deck[0];
  const lv = getLevelForCard(current);
  const badges = { easy: ['badge-easy', '🌸 М\'яко'], medium: ['badge-medium', '🔥 Гаряче'], hard: ['badge-hard', '💥 Максимум'] };
  const [cls, label] = badges[lv] || badges.easy;

  document.getElementById('cardBadge').className = 'card-level-badge ' + cls;
  document.getElementById('cardBadge').textContent = label;
  document.getElementById('cardNumber').textContent = `Карта ${current.idx} з ${deck.length + doneCount + skipCount}`;
  document.getElementById('cardEmoji').textContent = current.e;
  document.getElementById('cardText').textContent = current.t;
  document.getElementById('cardSub').textContent = current.s || '';
}

function flipCard() {
  if (!current) return;
  if (!isFlipped) {
    document.getElementById('cardWrap').classList.add('flipped');
    isFlipped = true;
  }
}

function nextCard() {
  if (!current) return;
  if (!isFlipped) { flipCard(); return; }
  history.unshift(current);
  deck.shift();
  doneCount++;
  isFlipped = false;
  document.getElementById('cardWrap').classList.remove('flipped');
  setTimeout(() => { loadNext(); updateStats(); updateHistory(); }, 400);
}

function skipCard() {
  if (!current) return;
  deck.shift();
  skipCount++;
  isFlipped = false;
  document.getElementById('cardWrap').classList.remove('flipped');
  setTimeout(() => { loadNext(); updateStats(); }, 400);
}

function updateStats() {
  document.getElementById('st-done').textContent = doneCount;
  document.getElementById('st-skip').textContent = skipCount;
  document.getElementById('st-left').textContent = deck.length;
}

function updateHistory() {
  const el = document.getElementById('historyEl');
  const list = document.getElementById('historyList');
  el.style.display = 'block';
  list.innerHTML = history.slice(0, 5).map(c =>
    `<div class="hist-item"><span class="hist-emoji">${c.e}</span><span class="hist-text">${c.t}</span></div>`
  ).join('');
}

function showDone() {
  document.getElementById('doneScreen').classList.add('show');
  document.getElementById('actionBtns').style.display = 'none';
  document.querySelector('.card-area').style.display = 'none';
}

// Init
restart();
</script>
